<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#6c5ce7" />
<title>Mathe-Abenteuer</title>
<style>
  :root {
    --bg-1: #6c5ce7;
    --bg-2: #00b8d4;
    --card: #ffffff;
    --ink: #2d3436;
    --muted: #636e72;
    --accent: #ff7675;
    --good: #00b894;
    --bad: #d63031;
    --dot-a: #fdcb6e;
    --dot-b: #74b9ff;
    --frame: #dfe6e9;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    font-size: 18px;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    background: linear-gradient(160deg, var(--bg-1), var(--bg-2));
  }

  #app {
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 12px) 14px max(env(safe-area-inset-bottom), 12px);
    gap: 10px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .topbar .pill {
    background: rgba(255,255,255,0.22);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 16px;
    backdrop-filter: blur(6px);
  }
  .topbar .title { font-size: 18px; letter-spacing: 0.5px; }

  .progress {
    height: 8px;
    background: rgba(255,255,255,0.25);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress > div {
    height: 100%;
    width: 0%;
    background: white;
    border-radius: 999px;
    transition: width 280ms ease;
  }

  .card {
    flex: 1;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
    background: var(--card);
    border-radius: 22px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.18);
    padding: clamp(12px, 2vmin, 20px);
    display: grid;
    gap: clamp(8px, 1.6vmin, 14px);
    min-height: 0;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto auto auto;
    grid-template-areas:
      "visual"
      "equation"
      "feedback"
      "choices";
  }
  .visual   { grid-area: visual; }
  .equation { grid-area: equation; }
  .feedback { grid-area: feedback; }
  .choices  { grid-area: choices; }

  .visual {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 0;
    min-width: 0;
  }

  .frames {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 360px;
  }

  /* Landscape: visual on the left (frames stay stacked vertically), equation + buttons on the right */
  @media (min-aspect-ratio: 1/1) {
    .card {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      grid-template-rows: 1fr auto auto auto 1fr;
      grid-template-areas:
        "visual ."
        "visual equation"
        "visual feedback"
        "visual choices"
        "visual .";
      column-gap: clamp(16px, 4vw, 40px);
      row-gap: 8px;
    }
    .frames {
      flex-direction: column;
      max-width: min(100%, 70vh);
    }
    .equation   { align-self: end; }
    .feedback   { align-self: center; }
    .choices    { align-self: start; width: 100%; max-width: 480px; margin: 0 auto; }
  }
  .frame {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 6px;
    padding: 8px;
    background: var(--frame);
    border-radius: 14px;
    aspect-ratio: 5 / 2;
  }
  .cell {
    background: rgba(255,255,255,0.7);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .dot {
    width: 80%;
    height: 80%;
    border-radius: 50%;
    transform: scale(0);
    animation: pop 320ms cubic-bezier(.18,.89,.32,1.28) forwards;
  }
  .dot.a { background: radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e); }
  .dot.b { background: radial-gradient(circle at 30% 30%, #a4d4ff, #0984e3); }
  .dot.removed { opacity: 0.35; }
  .dot.removed::after {
    content: "";
    position: absolute;
    inset: 10%;
    border-top: 4px solid var(--bad);
    transform: rotate(-25deg);
    border-radius: 4px;
    transform-origin: center;
  }
  @keyframes pop {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  .equation {
    text-align: center;
    font-size: clamp(38px, min(12vw, 14vh), 80px);
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--ink);
    margin: 6px 0 2px;
    line-height: 1;
  }
  .equation .op { color: var(--accent); margin: 0 10px; }
  .equation .q  { color: var(--bg-1); }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .choice {
    appearance: none;
    border: none;
    font: inherit;
    font-weight: 800;
    font-size: clamp(22px, min(6vw, 6vh), 34px);
    padding: clamp(12px, 2.4vh, 20px) 0;
    border-radius: 18px;
    color: white;
    background: linear-gradient(160deg, #6c5ce7, #4834d4);
    box-shadow: 0 6px 0 #2e1f9c, 0 8px 16px rgba(0,0,0,0.18);
    cursor: pointer;
    transition: transform 80ms ease, box-shadow 80ms ease, background 200ms;
    touch-action: manipulation;
  }
  .choice:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #2e1f9c, 0 4px 10px rgba(0,0,0,0.18);
  }
  .choice.correct {
    background: linear-gradient(160deg, #55efc4, #00b894);
    box-shadow: 0 6px 0 #00795c, 0 8px 16px rgba(0,0,0,0.18);
    animation: shake-good 320ms ease;
  }
  .choice.reveal {
    background: linear-gradient(160deg, #55efc4, #00b894);
    box-shadow: 0 6px 0 #00795c, 0 0 0 4px #fff, 0 0 0 8px #00b894, 0 10px 24px rgba(0,0,0,0.28);
    animation: pulse-reveal 900ms ease-in-out infinite;
    position: relative;
    z-index: 2;
  }
  .choice.wrong {
    background: linear-gradient(160deg, #ff7675, #d63031);
    box-shadow: 0 6px 0 #8b1a1a, 0 8px 16px rgba(0,0,0,0.18);
    animation: shake-bad 320ms ease;
  }
  .choice.dim { opacity: 0.35; }
  .choice[disabled] { cursor: default; }

  @keyframes shake-good {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px) scale(1.04); }
  }
  @keyframes shake-bad {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
  }
  @keyframes pulse-reveal {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.08); }
  }

  .feedback {
    text-align: center;
    min-height: 28px;
    font-weight: 700;
    font-size: clamp(16px, min(3.5vw, 3vh), 20px);
    color: var(--muted);
    transition: font-size 120ms ease;
  }
  .feedback.good { color: var(--good); }
  .feedback.bad  {
    color: var(--bad);
    font-size: clamp(18px, min(4.5vw, 4vh), 26px);
    font-weight: 800;
  }
  .feedback .ans {
    display: inline-block;
    background: var(--good);
    color: white;
    padding: 2px 14px;
    border-radius: 999px;
    margin-left: 4px;
    font-weight: 900;
  }

  /* Overlay (level complete) */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay.show { display: flex; }
  .modal {
    background: white;
    border-radius: 22px;
    padding: 22px 20px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
  }
  .modal h2 { margin: 0 0 6px; font-size: 26px; }
  .modal p  { margin: 0 0 14px; color: var(--muted); }
  .stars { font-size: 40px; letter-spacing: 4px; margin: 8px 0 14px; }
  .star { display: inline-block; transform: scale(0); animation: pop 380ms cubic-bezier(.18,.89,.32,1.28) forwards; }
  .star.dim { filter: grayscale(1) opacity(0.35); }
  .btn {
    appearance: none;
    border: none;
    font: inherit;
    font-weight: 800;
    font-size: 18px;
    padding: 14px 22px;
    border-radius: 14px;
    color: white;
    background: linear-gradient(160deg, #6c5ce7, #4834d4);
    box-shadow: 0 5px 0 #2e1f9c;
    cursor: pointer;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e1f9c; }

  /* Confetti */
  .confetti {
    position: fixed; pointer-events: none; inset: 0; overflow: hidden; z-index: 9;
  }
  .confetti span {
    position: absolute; top: -10px; width: 8px; height: 14px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="pill" id="level-pill">Stufe 1</div>
    <div class="title">Mathe-Abenteuer</div>
    <div class="pill" id="score-pill">⭐ 0</div>
  </div>

  <div class="progress"><div id="progress-bar"></div></div>

  <div class="card">
    <div class="visual">
      <div class="frames" id="frames"></div>
    </div>

    <div class="equation" id="equation"></div>

    <div class="feedback" id="feedback">Tippe auf die richtige Antwort!</div>

    <div class="choices" id="choices"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Gut gemacht!</h2>
    <div class="stars" id="modal-stars"></div>
    <p id="modal-text"></p>
    <button class="btn" id="modal-btn">Nochmal spielen</button>
  </div>
</div>

<div class="confetti" id="confetti"></div>

<script>
(() => {
  const TOTAL = 10;
  const MAX = 20;

  const $frames    = document.getElementById('frames');
  const $equation  = document.getElementById('equation');
  const $choices   = document.getElementById('choices');
  const $feedback  = document.getElementById('feedback');
  const $progress  = document.getElementById('progress-bar');
  const $score     = document.getElementById('score-pill');
  const $overlay   = document.getElementById('overlay');
  const $modalTitle= document.getElementById('modal-title');
  const $modalText = document.getElementById('modal-text');
  const $modalStars= document.getElementById('modal-stars');
  const $modalBtn  = document.getElementById('modal-btn');
  const $confetti  = document.getElementById('confetti');

  const state = { idx: 0, score: 0, current: null, locked: false };

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function makeProblem() {
    // 50/50 addition or subtraction; results stay in 0..MAX, operands in 0..MAX
    if (Math.random() < 0.5) {
      const a = rand(0, MAX);
      const b = rand(0, MAX - a);
      return { op: '+', a, b, answer: a + b };
    } else {
      const a = rand(1, MAX);
      const b = rand(0, a);
      return { op: '-', a, b, answer: a - b };
    }
  }

  function makeChoices(problem) {
    const { op, a, b, answer } = problem;
    const set = new Set([answer]);
    // Always include the "swap-operator" answer when it's a valid in-range number.
    const swap = op === '+' ? a - b : a + b;
    if (swap >= 0 && swap <= MAX && swap !== answer) set.add(swap);
    while (set.size < 4) {
      const delta = rand(-3, 3);
      const candidate = answer + delta;
      if (candidate >= 0 && candidate <= MAX && candidate !== answer) set.add(candidate);
    }
    const arr = [...set];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function renderFrames(problem) {
    // Build two ten-frames (20 cells total).
    $frames.innerHTML = '';
    const cells = [];
    for (let f = 0; f < 2; f++) {
      const frame = document.createElement('div');
      frame.className = 'frame';
      for (let i = 0; i < 10; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        frame.appendChild(cell);
        cells.push(cell);
      }
      $frames.appendChild(frame);
    }

    if (problem.op === '+') {
      // a yellow dots, then b blue dots
      for (let i = 0; i < problem.a; i++)         addDot(cells[i], 'a', i);
      for (let i = 0; i < problem.b; i++)         addDot(cells[problem.a + i], 'b', problem.a + i);
    } else {
      // a dots filled; the last b are crossed out
      for (let i = 0; i < problem.a; i++) {
        const removed = i >= problem.a - problem.b;
        addDot(cells[i], removed ? 'b' : 'a', i, removed);
      }
    }
  }

  function addDot(cell, kind, idx, removed = false) {
    const dot = document.createElement('div');
    dot.className = 'dot ' + kind + (removed ? ' removed' : '');
    dot.style.animationDelay = (idx * 30) + 'ms';
    cell.appendChild(dot);
  }

  function renderEquation(problem) {
    $equation.innerHTML =
      `<span>${problem.a}</span><span class="op">${problem.op}</span>` +
      `<span>${problem.b}</span><span class="op">=</span><span class="q">?</span>`;
  }

  function renderChoices(choices, answer) {
    $choices.innerHTML = '';
    choices.forEach(value => {
      const btn = document.createElement('button');
      btn.className = 'choice';
      btn.textContent = value;
      btn.addEventListener('click', () => onChoice(btn, value, answer));
      $choices.appendChild(btn);
    });
  }

  function onChoice(btn, value, answer) {
    if (state.locked) return;
    state.locked = true;
    const correct = value === answer;
    if (correct) {
      btn.classList.add('correct');
      state.score++;
      $score.textContent = '⭐ ' + state.score;
      $feedback.textContent = pick(['Toll!', 'Ja!', 'Super!', 'Klasse!', 'Spitze!', 'Bravo!']);
      $feedback.className = 'feedback good';
      setTimeout(next, 750);
    } else {
      btn.classList.add('wrong');
      $feedback.innerHTML = `Die richtige Antwort ist <span class="ans">${answer}</span>`;
      $feedback.className = 'feedback bad';
      [...$choices.children].forEach(c => {
        if (Number(c.textContent) === answer) c.classList.add('reveal');
        else if (c !== btn) c.classList.add('dim');
        c.disabled = true;
      });
      setTimeout(next, 3200);
    }
  }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function next() {
    state.idx++;
    state.locked = false;
    if (state.idx >= TOTAL) return finish();
    setProblem();
  }

  function setProblem() {
    state.current = makeProblem();
    $progress.style.width = ((state.idx) / TOTAL * 100) + '%';
    renderFrames(state.current);
    renderEquation(state.current);
    renderChoices(makeChoices(state.current), state.current.answer);
    $feedback.textContent = 'Tippe auf die richtige Antwort!';
    $feedback.className = 'feedback';
  }

  function finish() {
    $progress.style.width = '100%';
    const stars =
      state.score >= TOTAL ? 3 :
      state.score >= TOTAL - 2 ? 2 :
      state.score >= TOTAL - 4 ? 1 : 0;

    $modalTitle.textContent =
      stars === 3 ? 'Perfekt!' :
      stars >= 1  ? 'Gut gemacht!' : 'Gut versucht!';
    $modalText.textContent = `Du hast ${state.score} von ${TOTAL} richtig.`;

    $modalStars.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      s.className = 'star' + (i < stars ? '' : ' dim');
      s.style.animationDelay = (i * 140) + 'ms';
      s.textContent = '⭐';
      $modalStars.appendChild(s);
    }

    if (stars === 3) burstConfetti();
    $overlay.classList.add('show');
  }

  function reset() {
    state.idx = 0;
    state.score = 0;
    state.locked = false;
    $score.textContent = '⭐ 0';
    $overlay.classList.remove('show');
    $confetti.innerHTML = '';
    setProblem();
  }

  function burstConfetti() {
    const colors = ['#fdcb6e','#74b9ff','#55efc4','#ff7675','#a29bfe','#ffeaa7'];
    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('span');
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[i % colors.length];
      piece.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
      piece.style.animationDelay = Math.random() * 0.4 + 's';
      piece.style.transform = `rotate(${Math.random()*360}deg)`;
      $confetti.appendChild(piece);
    }
    setTimeout(() => { $confetti.innerHTML = ''; }, 3500);
  }

  $modalBtn.addEventListener('click', reset);

  // Prevent double-tap zoom on iOS for buttons
  document.addEventListener('gesturestart', e => e.preventDefault());

  setProblem();
})();
</script>
</body>
</html>
